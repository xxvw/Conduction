<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#0C0E12">
  <div style="display:flex;align-items:baseline;gap:32px">
    <div><div style="font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-weight:500;font-size:48px;color:#4FE3B2;letter-spacing:-0.02em">128.00</div><div class="hex" style="margin-top:6px">BPM · tabular</div></div>
    <div><div style="font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-weight:400;font-size:36px;color:#F5F7FB;letter-spacing:-0.01em">03:42</div><div class="hex" style="margin-top:6px">Time · mono</div></div>
    <div><div style="font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-weight:500;font-size:36px;color:#E8B868;letter-spacing:-0.01em">8A</div><div class="hex" style="margin-top:6px">Key · Camelot</div></div>
    <div><div style="font-family:'JetBrains Mono',monospace;font-weight:400;font-size:14px;color:#BAC3D2">+2.4%</div><div class="hex" style="margin-top:6px">Pitch</div></div>
  </div>
  <p style="margin-top:18px;font-size:11px;color:#828DA2;line-height:1.5">JetBrains Mono · tabular-nums · restrained weight (400/500). BPM / time / key / pitch は必ず等幅。</p>
</div></body></html>
