<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#0C0E12">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
    <div class="swatch"><div class="chip" style="background:#4FE3B2"></div><div class="name">Deck A</div><div class="hex">#4FE3B2</div></div>
    <div class="swatch"><div class="chip" style="background:#E8915A"></div><div class="name">Deck B</div><div class="hex">#E8915A</div></div>
    <div class="swatch"><div class="chip" style="background:#8A9BE8"></div><div class="name">Deck C</div><div class="hex">#8A9BE8</div></div>
    <div class="swatch"><div class="chip" style="background:#E87098"></div><div class="name">Deck D</div><div class="hex">#E87098</div></div>
    <div class="swatch"><div class="chip" style="background:#E8B868"></div><div class="name">Cue</div><div class="hex">#E8B868</div></div>
    <div class="swatch"><div class="chip" style="background:#A089DC"></div><div class="name">Loop</div><div class="hex">#A089DC</div></div>
    <div class="swatch"><div class="chip" style="background:#E84A5F"></div><div class="name">Live</div><div class="hex">#E84A5F</div></div>
    <div class="swatch"><div class="chip" style="background:repeating-linear-gradient(90deg,rgba(255,255,255,0.16) 0 1px,transparent 1px 8px),#13161C"></div><div class="name">Beat Grid</div><div class="hex">white 16%</div></div>
  </div>
</div></body></html>
