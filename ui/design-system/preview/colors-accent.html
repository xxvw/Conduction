<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#0C0E12">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px">
    <div class="swatch"><div class="chip" style="background:#4FE3B2;box-shadow:0 0 24px rgba(79,227,178,0.25),inset 0 1px 0 rgba(255,255,255,0.15)"></div><div class="name">Accent</div><div class="hex">#4FE3B2</div></div>
    <div class="swatch"><div class="chip" style="background:#7CEEC7"></div><div class="name">Accent Hi</div><div class="hex">#7CEEC7</div></div>
    <div class="swatch"><div class="chip" style="background:#2BB38A"></div><div class="name">Accent Lo</div><div class="hex">#2BB38A</div></div>
    <div class="swatch"><div class="chip" style="background:#14624B"></div><div class="name">Accent Dim</div><div class="hex">#14624B</div></div>
    <div class="swatch"><div class="chip" style="background:rgba(79,227,178,0.1);border:1px solid rgba(79,227,178,0.28)"></div><div class="name">Accent Soft</div><div class="hex">10% alpha</div></div>
  </div>
  <p style="margin-top:18px;font-size:12px;color:#828DA2;line-height:1.5">Softened mint — restrained, premium. CTA · selected · Deck A · signature only.</p>
</div></body></html>
