<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    height: 22px; padding: 0 10px;
    font-family: 'LINE Seed JP', system-ui, sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    border-radius: 4px;
    border: 1px solid;
    box-sizing: border-box;
    white-space: nowrap;
  }
  .pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .pill.mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; text-transform: none; font-weight: 500; font-variant-numeric: tabular-nums; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .group-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #5A6578; margin: 0 0 8px; }
</style>
</head>
<body><div class="card" style="background:#0C0E12;display:flex;flex-direction:column;gap:16px">
  <div>
    <div class="group-label">Deck identity</div>
    <div class="row">
      <span class="pill" style="color:#4FE3B2;background:rgba(79,227,178,0.08);border-color:rgba(79,227,178,0.28)"><span class="dot"></span>Deck A</span>
      <span class="pill" style="color:#E8915A;background:rgba(232,145,90,0.08);border-color:rgba(232,145,90,0.28)"><span class="dot"></span>Deck B</span>
      <span class="pill" style="color:#8A9BE8;background:rgba(138,155,232,0.08);border-color:rgba(138,155,232,0.28)"><span class="dot"></span>Deck C</span>
      <span class="pill" style="color:#E87098;background:rgba(232,112,152,0.08);border-color:rgba(232,112,152,0.28)"><span class="dot"></span>Deck D</span>
    </div>
  </div>
  <div>
    <div class="group-label">Mix markers</div>
    <div class="row">
      <span class="pill" style="color:#E8B868;background:rgba(232,184,104,0.08);border-color:rgba(232,184,104,0.28)"><span class="dot"></span>Cue</span>
      <span class="pill" style="color:#A089DC;background:rgba(160,137,220,0.08);border-color:rgba(160,137,220,0.28)"><span class="dot"></span>Loop 8</span>
      <span class="pill" style="color:#E84A5F;background:rgba(232,74,95,0.08);border-color:rgba(232,74,95,0.32);box-shadow:0 0 12px rgba(232,74,95,0.15)"><span class="dot" style="box-shadow:0 0 6px currentColor"></span>Live</span>
    </div>
  </div>
  <div>
    <div class="group-label">Metadata</div>
    <div class="row">
      <span class="pill mono" style="color:#E8B868;background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.07)">8A</span>
      <span class="pill mono" style="color:#E6EAF1;background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.07)">128.0 BPM</span>
      <span class="pill mono" style="color:#BAC3D2;background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.07)">+2.4%</span>
      <span class="pill" style="color:#828DA2;background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.07)">New</span>
    </div>
  </div>
</div></body></html>
