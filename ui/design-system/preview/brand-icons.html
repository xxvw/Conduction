<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest"></script></head>
<body><div class="card" style="background:#0C0E12">
  <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:16px;color:#BAC3D2;align-items:center;justify-items:center">
    <i data-lucide="play"></i><i data-lucide="pause"></i><i data-lucide="skip-back"></i><i data-lucide="skip-forward"></i>
    <i data-lucide="repeat"></i><i data-lucide="shuffle"></i><i data-lucide="disc-3"></i><i data-lucide="music-4"></i>
    <i data-lucide="headphones"></i><i data-lucide="sliders-horizontal"></i><i data-lucide="volume-2"></i><i data-lucide="mic"></i>
    <i data-lucide="radio"></i><i data-lucide="library"></i><i data-lucide="folder"></i><i data-lucide="search"></i>
    <i data-lucide="settings"></i><i data-lucide="bookmark"></i><i data-lucide="star"></i><i data-lucide="plus"></i>
  </div>
  <p style="margin-top:18px;font-size:11px;color:#828DA2;line-height:1.5">Lucide Icons · stroke 1.5 · currentColor · 22px default. 均一な視覚ウェイトで上品さを保つ。</p>
  <script>lucide.createIcons({attrs:{'stroke-width':1.5,'width':22,'height':22}});</script>
</div></body></html>
