<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#0C0E12">
  <div style="display:flex;gap:16px;align-items:flex-end;justify-content:center">
    <!-- Premium knob with metallic ring -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:68px;height:68px;border-radius:50%;
        background:
          radial-gradient(circle at 35% 30%, rgba(255,255,255,0.12), transparent 50%),
          conic-gradient(from 180deg, #3B4453, #1A1E26, #3B4453, #1A1E26, #3B4453);
        padding:3px;
        box-shadow:0 6px 14px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
        position:relative">
        <div style="width:100%;height:100%;border-radius:50%;
          background:radial-gradient(circle at 30% 25%,#2D3440,#13161C 70%);
          box-shadow:inset 0 2px 4px rgba(255,255,255,0.06),inset 0 -2px 4px rgba(0,0,0,0.5);
          position:relative">
          <div style="position:absolute;left:50%;top:6px;width:2.5px;height:14px;background:#4FE3B2;border-radius:2px;transform:translateX(-50%) rotate(35deg);transform-origin:50% 28px;box-shadow:0 0 6px rgba(79,227,178,0.7)"></div>
        </div>
      </div>
      <div style="font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#828DA2">Gain</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:68px;height:68px;border-radius:50%;
        background:conic-gradient(from 180deg, #3B4453, #1A1E26, #3B4453, #1A1E26, #3B4453);
        padding:3px;
        box-shadow:0 6px 14px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);">
        <div style="width:100%;height:100%;border-radius:50%;
          background:radial-gradient(circle at 30% 25%,#2D3440,#13161C 70%);
          box-shadow:inset 0 2px 4px rgba(255,255,255,0.06),inset 0 -2px 4px rgba(0,0,0,0.5);
          position:relative">
          <div style="position:absolute;left:50%;top:6px;width:2.5px;height:14px;background:#E6EAF1;border-radius:2px;transform:translateX(-50%) rotate(-20deg);transform-origin:50% 28px"></div>
        </div>
      </div>
      <div style="font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#828DA2">Hi</div>
    </div>

    <!-- Premium vertical fader with LED ladder -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-left:12px">
      <div style="width:32px;height:140px;background:linear-gradient(180deg,#0A0C10,#13161C);border:1px solid #2D3440;border-radius:6px;padding:5px;position:relative;box-shadow:inset 0 2px 8px rgba(0,0,0,0.7),0 0 0 0.5px rgba(0,0,0,0.4)">
        <div style="position:absolute;left:5px;right:5px;top:5px;bottom:5px;display:flex;flex-direction:column-reverse;gap:2px">
          <div style="flex:1;background:linear-gradient(180deg,#4FE3B2,#2BB38A);border-radius:1.5px;box-shadow:0 0 4px rgba(79,227,178,0.5)"></div>
          <div style="flex:1;background:linear-gradient(180deg,#4FE3B2,#2BB38A);border-radius:1.5px;opacity:0.95"></div>
          <div style="flex:1;background:linear-gradient(180deg,#4FE3B2,#2BB38A);border-radius:1.5px;opacity:0.9"></div>
          <div style="flex:1;background:linear-gradient(180deg,#4FE3B2,#2BB38A);border-radius:1.5px;opacity:0.85"></div>
          <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:1.5px"></div>
          <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:1.5px"></div>
          <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:1.5px"></div>
        </div>
        <div style="position:absolute;left:50%;top:35%;width:26px;height:14px;transform:translateX(-50%);background:linear-gradient(180deg,#828DA2,#3B4453);border-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.25),inset 0 -1px 0 rgba(0,0,0,0.3)"><div style="position:absolute;left:3px;right:3px;top:6px;height:1px;background:rgba(0,0,0,0.5)"></div></div>
      </div>
      <div style="font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#828DA2">Vol A</div>
    </div>

    <!-- Crossfader -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-left:12px">
      <div style="width:240px;height:34px;background:linear-gradient(180deg,#0A0C10,#13161C);border:1px solid #2D3440;border-radius:6px;padding:5px;position:relative;box-shadow:inset 0 2px 8px rgba(0,0,0,0.7),0 0 0 0.5px rgba(0,0,0,0.4)">
        <div style="position:absolute;left:5px;right:5px;top:50%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08) 20%,rgba(255,255,255,0.08) 80%,transparent)"></div>
        <div style="position:absolute;left:50%;top:6px;bottom:6px;width:1px;background:rgba(255,255,255,0.12);transform:translateX(-50%)"></div>
        <div style="position:absolute;top:5px;bottom:5px;left:38%;width:16px;background:linear-gradient(180deg,#828DA2,#3B4453);border-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.25),inset 0 -1px 0 rgba(0,0,0,0.3)"><div style="position:absolute;left:3px;right:3px;top:50%;height:1px;background:rgba(0,0,0,0.5);transform:translateY(-50%)"></div></div>
      </div>
      <div style="font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#828DA2">Crossfader</div>
    </div>
  </div>
</div></body></html>
