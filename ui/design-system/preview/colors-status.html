<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#0C0E12">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
    <div class="swatch"><div class="chip" style="background:#4FE3B2"></div><div class="name">Success</div><div class="hex">#4FE3B2</div></div>
    <div class="swatch"><div class="chip" style="background:#E8B868"></div><div class="name">Warning</div><div class="hex">#E8B868</div></div>
    <div class="swatch"><div class="chip" style="background:#E84A5F"></div><div class="name">Danger</div><div class="hex">#E84A5F</div></div>
    <div class="swatch"><div class="chip" style="background:#6CA8F2"></div><div class="name">Info</div><div class="hex">#6CA8F2</div></div>
  </div>
</div></body></html>
