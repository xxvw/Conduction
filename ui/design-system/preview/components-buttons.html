<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn {
    height: 38px; padding: 0 18px;
    font-family: 'LINE Seed JP', system-ui, sans-serif;
    font-weight: 700; font-size: 13px;
    border-radius: 8px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 160ms cubic-bezier(0.2,0.8,0.2,1);
    letter-spacing: 0;
  }
  .btn-primary {
    background: linear-gradient(180deg, #5CE8BA, #3ACFA0);
    color: #07201A; border: 1px solid rgba(79,227,178,0.6);
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.35), inset 0 -1px 0 rgba(0,0,0,0.25);
  }
  .btn-primary:hover { filter: brightness(1.05); }
  .btn-secondary {
    background: linear-gradient(180deg, #2A3040, #1E232E);
    color: #E6EAF1; border: 1px solid #3B4453;
    box-shadow: 0 1px 2px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.06), inset 0 -1px 0 rgba(0,0,0,0.3);
  }
  .btn-ghost {
    background: transparent; color: #BAC3D2;
    border: 1px solid #2D3440;
  }
  .btn-quiet {
    background: transparent; color: #BAC3D2; border: none;
  }
  .btn-danger {
    background: linear-gradient(180deg, #E85A6F, #C43D52);
    color: #fff; border: 1px solid rgba(232,74,95,0.6);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.5);
  }
  .kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    height: 26px; padding: 0 9px;
    background: rgba(255,255,255,0.04); color: #BAC3D2;
    border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
    box-shadow: inset 0 -1px 0 rgba(0,0,0,0.3);
    display: inline-flex; align-items: center;
  }
</style>
</head>
<body><div class="card" style="background:#0C0E12">
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-primary">ミックスを始める</button>
    <button class="btn btn-secondary">Load track</button>
    <button class="btn btn-ghost">キャンセル</button>
    <button class="btn btn-quiet">詳細</button>
    <button class="btn btn-danger">削除</button>
    <span class="kbd">⌘K</span>
  </div>
  <p style="margin-top:16px;font-size:11px;color:#828DA2">Primary · Secondary · Ghost · Quiet · Danger · Kbd. Subtle vertical gradients + inner rim light for dimensionality.</p>
</div></body></html>
